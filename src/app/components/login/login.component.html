<div class="container mt-3">
    <form [formGroup]="loginForm">
        <div class="form-group mb-3">
            <label>UserName</label>
            <input type="text" class="form-control" formControlName="userName">
            <div class="alert alert-danger mt-1" *ngIf="handleError('userName')">
                UserName is Required
            </div>
        </div>
        <div class="form-group mb-3">
            <label>Password</label>
            <input type="text" class="form-control" formControlName="password">
            <div class="alert alert-danger" *ngIf="handleError('password')">
                Password is Required
            </div>
        </div>

        <div class="mt-2">
            <button type="submit" class="btn btn-primary" (click)="submitLoginForm(loginForm)">Submit</button>
        </div>
    </form>
    <span [innerHTML]='"please use \"userName\": \"pradeep@gmail.com\" and \"password\": \"123\""'></span>

</div>
