<h4>Product List</h4>
<div class="container" *ngIf="products && products.length > 0; else noProducts">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Product Id</th>
                <th>Product Code</th>
                <th>Product Name</th>
                <th>Price</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products; trackBy:trackByProductId">
                <td>{{product.productId}}</td>
                <td>{{product.productCode}}</td>
                <td>{{product.productName}}</td>
                <td>{{product.price}}</td>
                <td>
                    <button type="submit" class="btn btn-primary" (click)="editProduct(product)">Edit</button>
                </td>
                <td>
                    <button type="submit" class="btn btn-danger" (click)="deleteProduct(product)">X</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<ng-template #noProducts>
    <div class="alert alert-warning">
        No products available.
    </div>
</ng-template>
